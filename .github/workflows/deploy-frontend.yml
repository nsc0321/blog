name: Deploy Frontend to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install & Build Agent Web
        run: |
          cd agentWeb
          npm install
          echo "VITE_API_URL=https://studies-columbus-broadband-contracts.trycloudflare.com" > .env.production
          npm run build

      - name: Prepare Deployment Folder
        run: |
          mkdir -p dist_combined
          # Copy agentWeb build directly to the root of the combined dist
          cp -a agentWeb/dist/. dist_combined/
          # Add custom 404 handler for SPA routing
          cp agentWeb/dist/index.html dist_combined/404.html

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist_combined
          branch: gh-pages
