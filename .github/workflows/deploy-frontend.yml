name: Deploy Frontend to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install & Build Blog
        run: |
          cd blog
          npm ci
          echo "VITE_API_URL=https://roughly-adjustment-catalogs-medical.trycloudflare.com" > .env.production
          npm run build

      - name: Install & Build Agent Web
        run: |
          cd agentWeb
          npm ci
          echo "VITE_API_URL=https://roughly-adjustment-catalogs-medical.trycloudflare.com" > .env.production
          npm run build

      - name: Combine Builds
        run: |
          mkdir -p dist_combined
          # Copy blog build to the root of combined dist
          cp -r blog/dist/* dist_combined/
          # Copy agentWeb build to /agent subfolder
          mkdir -p dist_combined/agent
          cp -r agentWeb/dist/* dist_combined/agent/
          # Add custom 404 handler for SPA routing if needed
          cp blog/dist/index.html dist_combined/404.html

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist_combined
          branch: gh-pages
